    <!-- 웹페이지의 핵심 내용이 들어가는 main 태그. -->
    <main>
        <!-- 페이지 제목 -->
        <div class="title">로그인</div>

        <!-- 사용자가 입력한 데이터를 서버로 보내기 위한 form 태그 -->
        <form action="#" method="post">
            <div class="input-box">
                <div class="input-box">
                    <!-- for 속성과 input의 id를 일치시켜서, 아이디라는 글자만 클릭해도 입력창에 커서가 가도록 함. -->
                    <label for="id">아이디</label>
                </div>
                <!-- 실제로 아이디를 입력하는 입력칸입니다. required 속성으로 필수 입력하게 함. -->
                <input class="input-general" type="text" id="id" name="id" placeholder="아이디를 입력해주세요" required>
            </div>

            <div class="input-box">
                <div class="input-box">
                    <label for="password">비밀번호</label>
                </div>
                <!-- type="password"로 설정하여 입력하는 글자가 까만 점(•)으로 가려지게 만듦 -->
                <input class="input-general" type="password" id="password" name="password" placeholder="비밀번호를 입력해주세요"
                    required>
            </div>

            <!-- 로그인 및 회원가입 버튼 -->
            <div class="button-group">
                <button type="submit" class="btn btn-login">로그인</button>
                <a href="join.html" class="btn btn-join">회원가입</a>
            </div>
        </form>
    </main>
